# Schedule configuration for Doug
# Human-readable version: HEARTBEAT.md

schedules:
  reddit_hunt:
    cron: "7 15 * * 1,3,5"
    timezone: America/Chicago
    cycle_type: reddit_hunt
    workflow: doug-reddit-hunt.yml

  ops_maintenance:
    cron: "3 11 * * *"
    timezone: America/Chicago
    cycle_type: ops_maintenance
    workflow: doug-ops-maintenance.yml

shadow_promotion:
  healthy_days_required: 3
  health_criteria:
    - no_crash
    - email_sent
    - memory_persisted

mission_deadline:
  day_limit: 60
  action_on_miss: human_review

milestones:
  - threshold: 10
    action: notify
  - threshold: 25
    action: notify
  - threshold: 50
    action: notify
  - threshold: 100
    action: retrospective
  - threshold: 200
    action: mission_complete
